name: Daily Code Review Summary

on:
  schedule:
    - cron: '0 7 * * *'   # 09:00 Berlin time
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show last 24h changes
        run: |
          echo "## Commits in last 24h"
          git log --oneline --since="24 hours ago" || echo "No commits in last 24h"

          echo ""
          echo "## Changed files"
          git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "Nothing to diff"

      - name: Check Swift files compile (basic lint)
        run: |
          echo "## Swift file count"
          find . -name "*.swift" | wc -l

          echo "## Edge Function file count"
          find ./supabase/functions -name "*.ts" 2>/dev/null | wc -l || echo "0"

          echo "## Migration files"
          ls supabase/migrations/*.sql 2>/dev/null || echo "No migrations"
